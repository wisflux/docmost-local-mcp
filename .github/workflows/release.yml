name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the package to npm"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-helpers:
    name: Build Helper (${{ matrix.target.id }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: darwin-arm64
            runner: macos-15
            platform: darwin
            arch: arm64
          - id: darwin-x64
            runner: macos-15-intel
            platform: darwin
            arch: x64
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - id: linux-x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
          - id: win32-arm64
            runner: windows-11-arm
            platform: win32
            arch: arm64
          - id: win32-x64
            runner: windows-2025
            platform: win32
            arch: x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/auth-helper

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build native helper
        run: npm run build:helper

      - name: Stage bundled helper
        run: node scripts/sync-helper-binary.mjs ${{ matrix.target.platform }} ${{ matrix.target.arch }}

      - name: Upload helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: helper-${{ matrix.target.id }}
          path: helpers/
          if-no-files-found: error

  package:
    name: Package Release Artifact
    runs-on: ubuntu-24.04
    needs: build-helpers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download bundled helper artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: helper-*
          path: .
          merge-multiple: true

      - name: Verify bundled helper set
        run: |
          test -f helpers/darwin-arm64/docmost-auth-helper
          test -f helpers/darwin-x64/docmost-auth-helper
          test -f helpers/linux-arm64/docmost-auth-helper
          test -f helpers/linux-x64/docmost-auth-helper
          test -f helpers/win32-arm64/docmost-auth-helper.exe
          test -f helpers/win32-x64/docmost-auth-helper.exe

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Create npm tarball
        run: npm pack

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: docmost-local-mcp-*.tgz
          if-no-files-found: error

  publish:
    name: Publish To npm
    runs-on: ubuntu-24.04
    needs: package
    if: github.event_name == 'push' || inputs.publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Download bundled helper artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: helper-*
          path: .
          merge-multiple: true

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish package
        run: npm publish --access public --provenance
