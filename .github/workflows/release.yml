name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the package to npm"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Binary (${{ matrix.target.id }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: darwin-arm64
            runner: macos-15
            binary_name: docmost-local-mcp
          - id: darwin-x64
            runner: macos-15-intel
            binary_name: docmost-local-mcp
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            binary_name: docmost-local-mcp
          - id: linux-x64
            runner: ubuntu-24.04
            binary_name: docmost-local-mcp
          - id: win32-arm64
            runner: windows-11-arm
            binary_name: docmost-local-mcp.exe
          - id: win32-x64
            runner: windows-2025
            binary_name: docmost-local-mcp.exe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary for upload
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target.binary_name }}" == *.exe ]]; then ext=".exe"; fi
          cp "target/release/${{ matrix.target.binary_name }}" "docmost-local-mcp-${{ matrix.target.id }}${ext}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: binary-${{ matrix.target.id }}
          path: docmost-local-mcp-${{ matrix.target.id }}*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build-binaries
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Run Rust tests
        run: cargo test

      - name: Download all binary artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: binary-*
          path: release-binaries
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release-binaries/*

  publish:
    name: Publish to npm
    runs-on: ubuntu-24.04
    needs: release
    if: github.event_name == 'push' || inputs.publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - name: Prepare npm package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          fi

          mkdir -p release-package
          cp npm/launcher/cli.js release-package/
          cp npm/launcher/postinstall.js release-package/
          cp npm/launcher/package.json release-package/
          cp README.md LICENSE release-package/

          node -e "
            const fs = require('fs');
            const pkgPath = 'release-package/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = process.env.VERSION;
            pkg.files = ['cli.js', 'postinstall.js', 'README.md', 'LICENSE'];
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish to npm
        run: cd release-package && npm publish --access public --provenance
