name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Run format check
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

  launcher-smoke:
    name: Launcher Smoke Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Create mock binary
        run: |
          mkdir -p npm/launcher/bin
          cat <<'EOF' > npm/launcher/bin/docmost-local-mcp
          #!/usr/bin/env sh
          echo "launcher-smoke:$*"
          EOF
          chmod +x npm/launcher/bin/docmost-local-mcp

      - name: Run launcher smoke test
        run: |
          output=$(node npm/launcher/cli.js --ping)
          test "$output" = "launcher-smoke:--ping"

      - name: Verify postinstall syntax
        run: node --check npm/launcher/postinstall.js

  platform-builds:
    name: Platform Build (${{ matrix.target.id }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: darwin-arm64
            runner: macos-15
          - id: darwin-x64
            runner: macos-15-intel
          - id: linux-arm64
            runner: ubuntu-24.04-arm
          - id: linux-x64
            runner: ubuntu-24.04
          - id: win32-arm64
            runner: windows-11-arm
          - id: win32-x64
            runner: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build Rust binary
        run: cargo build --release
